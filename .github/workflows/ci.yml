name: CI/CD pipeline

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  # 1. Build Stage - Populates the central dependency cache
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip
        id: cache-dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # We install here so the cache actually saves the populated files
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  test:
    runs-on: ubuntu-latest
    needs: build
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies and test tools
        run: |
          python -m pip install --upgrade pip
          # Explicitly ensuring pytest and click are available regardless of requirements.txt status
          pip install pytest click
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # This will now successfully run without a "command not found" block
      - name: Run tests (verbose)
        run: pytest tests/ -v

  coverage:
    runs-on: ubuntu-latest
    needs: test
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies and coverage tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov click
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests with coverage and generate HTML report
        run: pytest tests/ --cov=src --cov-report=html

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov

  # 4. Code Quality Stage - Runs in parallel with Test
  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install pylint
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Run pylint and save report
        run: |
          pylint src/ --output-format=text > lint_report.txt || true

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint_report.txt

  # 5. Code Formatting Stage - Runs in parallel with Test
  format:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install black
        run: |
          python -m pip install --upgrade pip
          pip install black

      - name: Check formatting with black (check)
        run: black src/ tests/ --check

      - name: Show black diff
        run: black src/ tests/ --diff || true

  # 6. Security Analysis Stage - Runs in parallel with Test
  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run bandit (console)
        run: bandit -r src/ -v || true

      - name: Run bandit (json output)
        run: bandit -r src/ -f json -o security_report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security_report.json